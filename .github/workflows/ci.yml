name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Install SAP JCo stub
        # SAP JCo is not redistributable. Install an empty stub so the build
        # resolves the `provided`-scope dependency in CI. Replace with a real
        # JCo JAR for integration tests.
        run: |
          jar cf sapjco3-stub.jar -C $(mktemp -d) .
          mvn -B install:install-file \
            -Dfile=sapjco3-stub.jar \
            -DgroupId=com.sap.conn.jco \
            -DartifactId=sapjco3 \
            -Dversion=3.1.10 \
            -Dpackaging=jar

      - name: Build with Maven
        run: mvn -B -ntp clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-jdk${{ matrix.java }}
          path: target/site/jacoco
          if-no-files-found: ignore
